<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Login & Sign Up</title>
    <style>
        :root {
            --hot-pink: #ff007f;
            --neon-pink: #ff1493;
            --dark-magenta: #9a004d;
            --light-pink-bg: #fff0f5;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff007f 0%, #ff69b4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--white);
            padding: 2.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 3px solid var(--neon-pink);
        }

        h1 {
            color: var(--hot-pink);
            margin: 0 0 0.2rem 0;
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: #555;
            margin-bottom: 1.8rem;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--dark-magenta);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #ffb6c1;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            font-size: 0.95rem;
            background-color: var(--light-pink-bg);
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--hot-pink);
            background-color: var(--white);
            box-shadow: 0 0 8px rgba(255, 0, 127, 0.3);
        }

        .row {
            display: flex;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--hot-pink) 0%, var(--neon-pink) 100%);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 20, 147, 0.6);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .toggle-text {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #444;
            font-weight: 500;
        }

        .toggle-text a {
            color: var(--hot-pink);
            text-decoration: none;
            font-weight: 700;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .toggle-text a:hover {
            border-bottom: 2px solid var(--hot-pink);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hey Welcome Buddy</h1>
    <p class="subtitle">Let's get you set up in style!</p>

    <form onsubmit="event.preventDefault();">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" placeholder="Pinky Pie" required>
        </div>

        <div class="input-group">
            <label>Email or Phone Number</label>
            <input type="text" placeholder="hello@hotpink.com or +123..." required>
        </div>

        <div class="row">
            <div class="input-group" style="flex: 1;">
                <label>Age</label>
                <input type="number" placeholder="21" min="1">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Gender</label>
                <select>
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                    <option value="other">Other</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn">Sign Up</button>
        
        <div class="toggle-text">
            Already have an account? <a href="#">Sign In</a>
        </div>
    </form>
</div>

</body>
</html>
